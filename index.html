<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LAB STOCK</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:12px;
width:100%;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
border:1px solid #ccc;
padding:8px;
cursor:pointer;
}

.result:hover{
background:#f1f1f1;
}

.box{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}

.tab{
display:flex;
gap:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#9b59b6;
color:white;
}

</style>

</head>

<body>

<h2>LAB STOCK</h2>

<div class="tab">

<button onclick="showTab('withdraw')" style="background:#2ecc71">
เบิกของ
</button>

<button onclick="showTab('receive')" style="background:#3498db">
รับของเข้า
</button>

<button onclick="showTab('summary')" style="background:#f39c12">
สรุปคงเหลือ
</button>

</div>

<!-- เบิกของ -->

<div id="withdrawTab">

<label>สินค้า</label>
<input id="search">

<div id="results"></div>

<div class="box">

<p>LOT: <span id="lot"></span></p>
<p>หมดอายุ: <span id="expire"></span></p>
<p>คงเหลือ: <span id="stock"></span></p>

</div>

<label>จำนวนที่เบิก</label>
<input id="qty" type="number">

<label>ชื่อผู้เบิก</label>
<input id="user">

<button onclick="withdraw()" style="background:#2ecc71">
ยืนยันการเบิก
</button>

</div>

<!-- รับของ -->

<div id="receiveTab" style="display:none">

<h3>รับของเข้า</h3>

<label>ชื่อสินค้า</label>
<input id="r_name">

<div id="r_results"></div>

<label>LOT</label>
<input id="r_lot">

<label>วันหมดอายุ</label>
<input id="r_expire" type="date">

<label>จำนวน</label>
<input id="r_qty" type="number">

<button onclick="receiveStock()" style="background:#3498db">
บันทึกรับของ
</button>

</div>

<!-- SUMMARY -->

<div id="summaryTab" style="display:none">

<h3>สรุปคงเหลือ</h3>

<table id="summaryTable">

<tr>
<th>สินค้า</th>
<th>คงเหลือ</th>
</tr>

</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://nzvbdbwphvaxatkwuimy.supabase.co",
"sb_publishable_fn0n0KVCq_WmmcmzkC9g1Q_DyVqFhvt"
)

let currentLots=[]
let selectedLot=null

function showTab(tab){

document.getElementById("withdrawTab").style.display="none"
document.getElementById("receiveTab").style.display="none"
document.getElementById("summaryTab").style.display="none"

if(tab=="withdraw") document.getElementById("withdrawTab").style.display="block"
if(tab=="receive") document.getElementById("receiveTab").style.display="block"

if(tab=="summary"){
document.getElementById("summaryTab").style.display="block"
loadSummary()
}

}






/* SEARCH WITHDRAW */

document.getElementById("search").addEventListener("input",async function(){

let keyword=this.value

if(keyword.length<1){
document.getElementById("results").innerHTML=""
return
}

const {data}=await supabaseClient
.from("product")
.select("*")
.ilike("name","%"+keyword+"%")

let names=[...new Set(data.map(x=>x.name))]

let html=""

names.forEach(name=>{
html+=`<div class="result" onclick="loadLots('${name}')">${name}</div>`
})

document.getElementById("results").innerHTML=html

})





async function loadLots(name){

document.getElementById("search").value=name
document.getElementById("results").innerHTML=""

const {data}=await supabaseClient
.from("product")
.select("*")
.eq("name",name)
.order("expire",{ascending:true})

currentLots=data
selectedLot=data[0]

showLot()

}



function showLot(){

document.getElementById("lot").innerText=selectedLot.lot
document.getElementById("expire").innerText=selectedLot.expire
document.getElementById("stock").innerText=selectedLot.stock

}






async function withdraw(){

let qty=parseInt(document.getElementById("qty").value)
let user=document.getElementById("user").value

if(!qty){ alert("กรอกจำนวน"); return }

let newStock = Number(selectedLot.stock) - qty

if(newStock<0){
alert("สต็อกไม่พอ")
return
}

await supabaseClient
.from("product")
.update({stock:newStock})
.eq("id",selectedLot.id)

alert("เบิกสำเร็จ")

location.reload()

}







/* RECEIVE SEARCH */

document.getElementById("r_name").addEventListener("input",async function(){

let keyword=this.value

if(keyword.length<1){
document.getElementById("r_results").innerHTML=""
return
}

const {data}=await supabaseClient
.from("product")
.select("*")
.ilike("name","%"+keyword+"%")

let names=[...new Set(data.map(x=>x.name))]

let html=""

names.forEach(name=>{
html+=`<div class="result" onclick="selectReceive('${name}')">${name}</div>`
})

document.getElementById("r_results").innerHTML=html

})

function selectReceive(name){

document.getElementById("r_name").value=name
document.getElementById("r_results").innerHTML=""

}





async function receiveStock(){

let name=document.getElementById("r_name").value
let lot=document.getElementById("r_lot").value
let expire=document.getElementById("r_expire").value
let qty=parseInt(document.getElementById("r_qty").value)

if(!name || !lot || !qty){
alert("กรอกข้อมูลให้ครบ")
return
}

await supabaseClient
.from("product")
.insert([
{
name:name,
lot:lot,
expire:expire,
stock:qty
}
])

alert("รับของสำเร็จ")

location.reload()

}






async function loadSummary(){

const {data}=await supabaseClient
.from("product")
.select("*")

let summary={}

data.forEach(item=>{

if(!summary[item.name]) summary[item.name]=0

summary[item.name]+=Number(item.stock)

})

let table=document.getElementById("summaryTable")

table.innerHTML=`
<tr>
<th>สินค้า</th>
<th>คงเหลือ</th>
</tr>
`

for(let name in summary){

table.innerHTML+=`
<tr>
<td>${name}</td>
<td>${summary[name]}</td>
</tr>
`

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>LAB STOCK</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:linear-gradient(135deg,#eef3f9,#f8fbff);
max-width:900px;
margin:auto;
padding:20px;
color:#2c3e50;
}

/* TITLE */

h2{
margin-bottom:20px;
font-weight:700;
letter-spacing:1px;
color:#2c3e50;
}

/* TAB MENU */

.tab{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.tab button{
flex:1;
padding:10px;
border-radius:10px;
border:none;
font-weight:600;
cursor:pointer;
transition:0.2s;
background:#ecf0f1;
color:#2c3e50;
}

.tab button:hover{
background:#dfe6e9;
}

/* ACTIVE BUTTON (เพิ่มคลาสทีหลังได้) */
.tab button.active{
background:#3498db;
color:white;
}

/* CARD */

#withdrawTab,
#receiveTab,
#historyTab,
#summaryTab,
#reportTab{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:15px;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin:6px 0 14px 0;
border:1px solid #dcdde1;
border-radius:10px;
font-size:14px;
transition:0.2s;
background:#fafafa;
}

input:focus,select:focus{
border-color:#3498db;
outline:none;
background:white;
box-shadow:0 0 0 2px rgba(52,152,219,0.15);
}

/* BUTTON */

button{
padding:12px;
width:100%;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* ปุ่มหลัก */
button.primary{
background:#3498db;
color:white;
}

button.success{
background:#2ecc71;
color:white;
}

button.warning{
background:#f39c12;
color:white;
}

button.secondary{
background:#95a5a6;
color:white;
}

/* RESULT SEARCH */

.result{
border:1px solid #eee;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:4px;
background:white;
transition:0.15s;
}

.result:hover{
background:#f1f6ff;
border-color:#3498db;
}

/* LOT BOX */

.box{
border:1px solid #ecf0f1;
padding:14px;
border-radius:10px;
background:#f9fbfd;
margin-bottom:15px;
}

/* MESSAGE */

.message{
font-weight:600;
margin-top:8px;
font-size:14px;
}

.good{
color:#27ae60;
}

.warn{
color:#e74c3c;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
border-radius:10px;
overflow:hidden;
font-size:14px;
}

th,td{
padding:10px 12px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#3498db;
color:white;
font-weight:600;
}

tr:hover{
background:#f5f9ff;
}

tr:nth-child(even){
background:#fafafa;
}

/* LABEL */

label{
font-weight:600;
font-size:13px;
color:#34495e;
}

/* MOBILE */

@media(max-width:600px){

body{
padding:12px;
}

h2{
font-size:20px;
}

.tab{
flex-direction:column;
}

}

</style>

</head>

<body>

<h1 style="
margin-bottom:10px;
font-size:28px;
font-weight:700;
color:#2c3e50;
border-bottom:3px solid #3498db;
padding-bottom:5px;
">
ระบบคลังวัสดุห้องปฏิบัติการ โรงพยาบาพระปกเกล้า สาขาเมือง
</h1>

<div style="
margin-bottom:20px;
font-size:14px;
color:#7f8c8d;
">
LAB STOCK
</div>

<div class="tab">

<button class="success" onclick="showTab('withdraw')">📤 เบิกของ</button>
<button class="primary" onclick="showTab('receive')">📥 รับของเข้า</button>
<button class="secondary" onclick="showTab('history')">📜 ประวัติการเบิก</button>
<button class="warning" onclick="showTab('summary')">📊 คงเหลือ</button>
<button class="primary" onclick="showTab('report')">📈สรุปยอดการเบิก</button>

</div>

<!-- เบิกของ -->

<div id="withdrawTab">

<label>รายการ</label>
<input id="search" placeholder="🔎 พิมพ์ชื่อรายการ...">

<div id="results"></div>

<div class="box">

<label>เลือก LOT</label>
<select id="lotSelect" onchange="changeLot()"></select>

<p>หมดอายุ: <span id="expire"></span></p>
<p>คงเหลือ: <span id="stock"></span></p>

<p id="lotMessage" class="message"></p>

</div>

<label>จำนวนที่เบิก</label>
<input id="qty" type="number">

<label>ชื่อผู้เบิก</label>
<input id="user">

<label>งาน</label>
<select id="workType" disabled>
  <option value="">-- เลือกงาน --</option>
  <option value="Hematology">Hematology</option>
  <option value="Microscopy">Microscopy</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Other">Other</option>
</select>

<button class="success" onclick="withdraw()">ยืนยันการเบิก</button>

</div>

<!-- RECEIVE -->

<div id="receiveTab" style="display:none">

<h3>รับของเข้า</h3>

<label>ชื่อสินค้า</label>
<input id="r_name" placeholder="🔎 พิมพ์ชื่อรายการ...">

<div id="r_results"></div>

<label>LOT</label>
<input id="r_lot">

<label>วันหมดอายุ</label>
<input id="r_expire" type="date">

<label>จำนวน</label>
<input id="r_qty" type="number">

<label>งาน</label>
<select id="r_workType">
  <option value="">-- เลือกงาน --</option>
  <option value="Hematology">Hematology</option>
  <option value="Microscopy">Microscopy</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Other">Other</option>
</select>

<p id="receivePreview"></p>

<button onclick="receiveStock()" style="background:#3498db">บันทึกรับของ</button>

</div>

<!-- HISTORY -->

<div id="historyTab" style="display:none">

<h3>ประวัติการเบิก</h3>

<label>ค้นหา</label>
<input id="historySearch" placeholder="ค้นหาชื่อรายการ / ผู้เบิก">

<div id="historyResults"></div>

<label>ช่วงเวลา</label>
<select id="historyRange" onchange="loadHistory()">
<option value="1">วันนี้</option>
<option value="7" selected>7 วัน</option>
<option value="30">30 วัน</option>
<option value="365">ทั้งหมด</option>
</select>

<p id="historyTotal" style="
margin-top:10px;
font-weight:600;
color:#2c3e50;
"></p>

<table id="historyTable">
<tr>
<th>สินค้า</th>
<th>LOT</th>
<th>จำนวน</th>
<th>ผู้เบิก</th>
<th>วันที่</th>
<th>เวลา</th>
</tr>
</table>

</div>

<!-- SUMMARY -->

<div id="summaryTab" style="display:none">

<h3>สรุปยอดคงเหลือ</h3>

<label>ค้นหารายการ</label>
<input id="summarySearch" placeholder="พิมพ์ชื่อรายการ...">

<label>เลือกงาน</label>
<select id="summaryWork" onchange="loadSummary()">
  <option value="">-- ทั้งหมด --</option>
  <option value="Hematology">Hematology</option>
  <option value="Microscopy">Microscopy</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Other">Other</option>
</select>

<table id="summaryTable">
<tr>
<th>สินค้า</th>
<th>คงเหลือ</th>
</tr>
</table>

</div>

<div id="reportTab" style="display:none">

<h3>สรุปการเบิกตามงาน</h3>

<label>เลือกงาน</label>
<select id="reportWork">
  <option value="">-- ทั้งหมด --</option>
  <option value="Hematology">Hematology</option>
  <option value="Microscopy">Microscopy</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Other">Other</option>
</select>

<label>ช่วงเวลา</label>
<select id="reportRange" onchange="loadReport()">
  <option value="7">7 วัน</option>
  <option value="30" selected>30 วัน</option>
  <option value="365">ทั้งหมด</option>
</select>

<table id="reportTable">
<tr>
<th>สินค้า</th>
<th>จำนวนที่เบิก</th>
</tr>
</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://nzvbdbwphvaxatkwuimy.supabase.co",
"sb_publishable_fn0n0KVCq_WmmcmzkC9g1Q_DyVqFhvt"
)

let currentLots=[]
let selectedLotIndex=0

function showTab(tab){

document.getElementById("withdrawTab").style.display="none"
document.getElementById("receiveTab").style.display="none"
document.getElementById("historyTab").style.display="none"
document.getElementById("summaryTab").style.display="none"
document.getElementById("reportTab").style.display="none"

if(tab=="withdraw") document.getElementById("withdrawTab").style.display="block"
if(tab=="receive") document.getElementById("receiveTab").style.display="block"

if(tab=="history"){
document.getElementById("historyTab").style.display="block"
loadHistory()
}

if(tab=="summary"){
document.getElementById("summaryTab").style.display="block"
loadSummary()
}

if(tab=="report"){
document.getElementById("reportTab").style.display="block"
loadReport()
}

}

/* SEARCH */

document.getElementById("search").addEventListener("input",async function(){

let keyword=this.value

if(keyword.length<1){
document.getElementById("results").innerHTML=""
return
}

const {data}=await supabaseClient
.from("product")
.select("name")
.ilike("name","%"+keyword+"%")

let names=[...new Set(data.map(x=>x.name))]

let html=""

names.forEach(name=>{
html+=`<div class="result" onclick="loadLots('${name}')">${name}</div>`
})

document.getElementById("results").innerHTML=html

})

async function loadLots(name){

document.getElementById("search").value=name
document.getElementById("results").innerHTML=""

const {data}=await supabaseClient
.from("product")
.select("*")
.eq("name",name)
.order("expire",{ascending:true})

currentLots=data
selectedLotIndex=0

let select=document.getElementById("lotSelect")
select.innerHTML=""

data.forEach((lot,i)=>{
select.innerHTML+=`<option value="${i}">${lot.lot}</option>`
})

showLot()

let workType = data[0].work_type || ""
document.getElementById("workType").value = workType

}

function changeLot(){
selectedLotIndex=document.getElementById("lotSelect").value
showLot()
}

function showLot(){

let lot=currentLots[selectedLotIndex]

document.getElementById("expire").innerText=lot.expire
document.getElementById("stock").innerText=lot.stock
document.getElementById("qty").max = lot.stock

let msg=document.getElementById("lotMessage")

if(currentLots.length==1){

msg.innerText="✅รายการนี้มีเพียง Lot เดียว"
msg.className="message good"

}else{

if(selectedLotIndex==0){

msg.innerText="✅ระบบได้ทำการเลือก Lot ที่ใกล้วัน Expire ที่สุดมาให้แล้ว"
msg.className="message good"

}else{

msg.innerText="⚠️LOT นี้ไม่ใช่ LOT ที่จะ Expire ใกล้ที่สุด"
msg.className="message warn"

}

}

}

async function withdraw(){

document.getElementById("workType").disabled = false

let qty=parseInt(document.getElementById("qty").value)
let user=document.getElementById("user").value
let workType=document.getElementById("workType").value
let lot=currentLots[selectedLotIndex]

let newStock = Number(lot.stock) - qty

if(newStock < 0){
alert("สต็อกไม่พอ")
return
}

await supabaseClient
.from("product")
.update({stock:newStock})
.eq("id",lot.id)

let now=new Date()

await supabaseClient
.from("history")
.insert({
name:lot.name,
lot:lot.lot,
qty:qty,
user:user,
work_type:workType,   // 👈 เพิ่มตรงนี้
date:now.toISOString().split("T")[0],
time:now.toLocaleTimeString()
})

alert("เบิกสำเร็จ")

location.reload()

}
/* RECEIVE SEARCH */

document.getElementById("r_name").addEventListener("input",async function(){

let keyword=this.value

if(keyword.length<1){
document.getElementById("r_results").innerHTML=""
return
}

const {data}=await supabaseClient
.from("product")
.select("*")
.ilike("name","%"+keyword+"%")

let names=[...new Set(data.map(x=>x.name))]

let html=""

names.forEach(name=>{
html+=`<div class="result" onclick="selectReceive('${name}')">${name}</div>`
})

document.getElementById("r_results").innerHTML=html

})

function selectReceive(name){

document.getElementById("r_name").value=name
document.getElementById("r_results").innerHTML=""

}

async function receiveStock(){

let workType=document.getElementById("r_workType").value

let name=document.getElementById("r_name").value
let lot=document.getElementById("r_lot").value
let expire=document.getElementById("r_expire").value
let qty=parseInt(document.getElementById("r_qty").value)

if(!name || !lot || !qty){
alert("กรอกข้อมูลให้ครบ")
return
}

await supabaseClient
.from("product")
.insert([
{
name:name,
lot:lot,
expire:expire,
stock:qty,
work_type:workType   
}
])

alert("รับของสำเร็จ")

location.reload()

}

document.getElementById("r_qty").addEventListener("input",function(){

let name=document.getElementById("r_name").value
let lot=document.getElementById("r_lot").value
let qty=this.value

document.getElementById("receivePreview").innerText=
"📦 จะเพิ่ม "+qty+" ชิ้น ใน "+name+" (LOT "+lot+")"

})

/* HISTORY */

async function loadHistory(){

let range = document.getElementById("historyRange").value

let today = new Date()
let past = new Date()

past.setDate(today.getDate() - range)

let startDate = past.toISOString().split("T")[0]

let keyword = document.getElementById("historySearch").value

let query = supabaseClient
.from("history")
.select("*")
.gte("date",startDate)

if(keyword){
query = query.eq("name",keyword)
}

const {data} = await query.order("id",{ascending:false})

let total = 0

let table=document.getElementById("historyTable")

table.innerHTML=`
<tr>
<th>สินค้า</th>
<th>LOT</th>
<th>จำนวน</th>
<th>งาน</th>
<th>ผู้เบิก</th>
<th>วันที่</th>
<th>เวลา</th>
</tr>
`

if(data.length==0){

table.innerHTML=`
<tr>
<td colspan="6" style="padding:20px;">
<div style="
background:#ffeaea;
border:2px solid #e74c3c;
color:#c0392b;
padding:14px;
border-radius:8px;
font-weight:500;
text-align:center;
">
⚠️ รายการนี้ในช่วงเวลาที่เลือกยังไม่มีการเบิก
</div>
</td>
</tr>
`
document.getElementById("historyTotal").innerText =
"📊 รวมเบิกทั้งหมด 0 ชิ้น"

return

}

data.forEach(item=>{

total += Number(item.qty)

table.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>${item.lot}</td>
<td>${item.qty}</td>
<td>${item.work_type || '-'}</td>
<td>${item.user}</td>
<td>${item.date}</td>
<td>${item.time}</td>
</tr>
`

})
document.getElementById("historyTotal").innerText =
"📊 รวมเบิกทั้งหมด " + total + " ชิ้น"

}

/* SUMMARY */

async function loadSummary(){

let work = document.getElementById("summaryWork").value

let query = supabaseClient
.from("product")
.select("*")

if(work){
query = query.eq("work_type", work)
}

const {data}=await query

let summary={}

data.forEach(item=>{
if(!summary[item.name]) summary[item.name]=0
summary[item.name]+=Number(item.stock)
})

let table=document.getElementById("summaryTable")

table.innerHTML=`
<tr>
<th>สินค้า</th>
<th>คงเหลือ</th>
</tr>
`

let names = Object.keys(summary).sort((a,b)=>
a.toLowerCase().localeCompare(b.toLowerCase())
)

names.forEach(name=>{

let stock = summary[name]
let color = "#2ecc71"

if(stock <= 5){
color = "#e74c3c"
}
else if(stock <= 10){
color = "#f39c12"
}

table.innerHTML+=`
<tr>
<td>${name}</td>
<td>
<span style="
background:${color};
color:white;
padding:6px 12px;
border-radius:999px;
font-size:13px;
font-weight:600;
display:inline-block;
min-width:30px;
text-align:center;
">
${stock}
</span>
</td>
</tr>
`
})

}

document.getElementById("summarySearch").addEventListener("input",function(){

let keyword = this.value.toLowerCase()

let rows = document.querySelectorAll("#summaryTable tr")

rows.forEach((row,index)=>{

if(index==0) return

let text = row.children[0].innerText.toLowerCase()

if(text.includes(keyword)){
row.style.display=""
}else{
row.style.display="none"
}

})

})
 document.getElementById("historySearch").addEventListener("input",async function(){

let keyword=this.value

if(keyword.length<1){
document.getElementById("historyResults").innerHTML=""
return
}

const {data}=await supabaseClient
.from("product")
.select("*")
.ilike("name","%"+keyword+"%")

let names=[...new Set(data.map(x=>x.name))]

let html=""

names.forEach(name=>{
html+=`<div class="result" onclick="selectHistory('${name}')">${name}</div>`
})

document.getElementById("historyResults").innerHTML=html

})

async function loadReport(){

let range = document.getElementById("reportRange").value
let work = document.getElementById("reportWork").value

let today = new Date()
let past = new Date()

past.setDate(today.getDate() - range)

let startDate = past.toISOString().split("T")[0]

let query = supabaseClient
.from("history")
.select("*")
.gte("date",startDate)

if(work){
query = query.eq("work_type",work)
}

const {data} = await query

let summary = {}

data.forEach(item=>{
if(!summary[item.name]) summary[item.name]=0
summary[item.name]+=Number(item.qty)
})

let table=document.getElementById("reportTable")

table.innerHTML=`
<tr>
<th>สินค้า</th>
<th>จำนวนที่เบิก</th>
</tr>
`

let names = Object.keys(summary)

if(names.length==0){
table.innerHTML+=`
<tr>
<td colspan="2" style="text-align:center;padding:20px;">
ไม่มีข้อมูล
</td>
</tr>
`
return
}

names.forEach(name=>{
table.innerHTML+=`
<tr>
<td>${name}</td>
<td>${summary[name]}</td>
</tr>
`
})

}

function selectHistory(name){

document.getElementById("historySearch").value = name
document.getElementById("historyResults").innerHTML = ""

loadHistory()

}

</script>

</body>
</html>
